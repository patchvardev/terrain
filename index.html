<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stabilized Mesh Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <style>
        body { 
            margin: 0; 
            background: radial-gradient(circle at center, #333 0%, #000 100%);
            height: 100vh;
            overflow: hidden; 
            font-family: 'Courier New', monospace; 
            cursor: grab;
        }
        body:active { cursor: grabbing; }
        canvas { display: block; position: fixed; top: 0; left: 0; }
        #controls { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0, 0, 0, 0.9); padding: 20px; 
            border: 1px solid #444; color: #fff; 
            width: 250px; z-index: 100; border-radius: 4px;
        }
        .slider-wrap { margin-bottom: 12px; }
        label { display: block; font-size: 10px; font-weight: bold; margin-bottom: 4px; color: #888; text-transform: uppercase; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #00ffcc; }
        .val-num { float: right; color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>

<div id="controls">
    <div style="font-weight: bold; font-size: 13px; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 5px;">STABILIZED_ENGINE_v21.0</div>
    
    <div class="slider-wrap">
        <label>Elevation <span class="val-num" id="v-fold">12</span></label>
        <input type="range" id="fold" min="0" max="45" value="12">
    </div>

    <div class="slider-wrap">
        <label>Mouse Force <span class="val-num" id="v-impact">40</span></label>
        <input type="range" id="impact" min="0" max="100" value="40">
    </div>

    <div class="slider-wrap">
        <label>Resolution <span class="val-num" id="v-det">60</span></label>
        <input type="range" id="detail" min="20" max="100" step="10" value="60">
    </div>

    <div class="slider-wrap">
        <label>Surface Hue <span class="val-num" id="v-hue">180</span></label>
        <input type="range" id="hue" min="0" max="360" value="180">
    </div>
