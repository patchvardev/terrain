<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Planetary Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background-color: #ffffff; overflow: hidden; font-family: 'Courier New', monospace; }
        #controls { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(255, 255, 255, 0.95); padding: 20px; 
            border: 2px solid #333; color: #222; 
            width: 270px; z-index: 100; border-radius: 4px;
        }
        .slider-wrap { margin-bottom: 12px; }
        label { display: block; font-size: 10px; font-weight: bold; margin-bottom: 4px; color: #555; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #333; }
        .val-num { float: right; color: #000; font-weight: bold; }
        #status-bar { font-size: 9px; margin-top: 12px; padding-top: 8px; border-top: 1px solid #ddd; color: #888; text-align: center; }
    </style>
</head>
<body>

<div id="controls">
    <div style="font-weight: bold; font-size: 13px; margin-bottom: 12px; border-bottom: 2px solid #333; padding-bottom: 5px;">PLANETARY_SYSTEM_v9.0</div>
    
    <div class="slider-wrap">
        <label>Tectonic Height <span class="val-num" id="v-fold">10</span></label>
        <input type="range" id="fold" min="0" max="35" value="10">
    </div>

    <div class="slider-wrap">
        <label>Seismic Force <span class="val-num" id="v-impact">40</span></label>
        <input type="range" id="impact" min="0" max="100" value="40">
    </div>

    <div class="slider-wrap">
        <label>Active Biome <span class="val-num" id="v-eco">Earth</span></label>
        <input type="range" id="eco" min="0" max="5" step="1" value="0">
    </div>

    <div id="status-bar">SURFACE_READY // ALL_BIOMES_LOADED</div>
</div>

<script>
    let scene, camera, renderer, mesh, geometry;
    let mouse = new THREE.Vector2(-1, -1);
    let raycaster = new THREE.Raycaster();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.set(0, 120, 160); 
        camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const light = new THREE.DirectionalLight(0xffffff, 0.4);
        light.position.set(50, 100, 50);
        scene.add(light);

        // High-performance vertex grid
        geometry = new THREE.PlaneBufferGeometry(180, 180, 80, 80);
        const material = new THREE.MeshPhongMaterial({ 
            vertexColors: true,
            flatShading: true,
            side: THREE.DoubleSide
        });

        mesh = new THREE.Mesh(geometry, material);
        mesh.rotation.x = -Math.PI / 2;
        scene.add(mesh);

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        const pos = geometry.attributes.position;
        const colors = [];
        
        const fold = parseFloat(document.getElementById('fold').value);
        const impact = parseFloat(document.getElementById('impact').value);
        const ecoMode = parseInt(document.getElementById('eco').value);

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObject(mesh);
        let point = (intersects.length > 0) ? intersects[0].point : null;

        for (let i = 0; i < pos.count; i++) {
            let px = pos.getX(i);
            let py = pos.getY(i);
            
            // Core Procedural Logic
            let z = (Math.sin(px * 0.1) * Math.cos(py * 0.1) * fold);
            
            // Seismic Interaction
            if (point) {
                const dx = px - point.x;
                const dy = py - (-point.z);
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 35) z += (1 - dist / 35) * impact;
            }

            let currentZ = pos.getZ(i);
            let finalZ = currentZ + (z - currentZ) * 0.1;
            pos.setZ(i, finalZ);

            // Planetary Biome Library
            const color = new THREE.Color();
            if (ecoMode == 0) { // Earth
                if (finalZ < 2) color.setHex(0x1a5e63);
                else if (finalZ < 15) color.setHex(0x2d5a27);
                else color.setHex(0xeeeeee);
            } else if (ecoMode == 1) { // Mars
                if (finalZ < 10) color.setHex(0x7c3f37);
                else color.setHex(0xbc4a3c);
            } else if (ecoMode == 2) { // Arctic
                if (finalZ < 5) color.setHex(0xadd8e6);
                else color.setHex(0xffffff);
            } else if (ecoMode == 3) { // Venus (Volcanic)
                if (finalZ < 12) color.setHex(0x331100);
                else color.setHex(0xff4400);
            } else if (ecoMode == 4) { // Neptune (Gas)
                if (finalZ < 10) color.setHex(0x000066);
                else color.setHex(0x4488ff);
            } else { // Moon
                if (finalZ < 10) color.setHex(0x333333);
                else color.setHex(0x999999);
            }
            colors.push(color.r, color.g, color.b);
        }

        geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
        pos.needsUpdate = true;
        geometry.computeVertexNormals();

        const ecoNames = ["Earth", "Mars", "Arctic", "Venus", "Neptune", "Moon"];
        document.getElementById('v-fold').innerText = fold;
        document.getElementById('v-impact').innerText = impact;
        document.getElementById('v-eco').innerText = ecoNames[ecoMode];

        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
