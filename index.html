<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic Procedural System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: monospace; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #interface { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0, 0, 0, 0.9); padding: 20px; 
            border: 1px solid #00ffcc; color: #00ffcc; 
            width: 260px; z-index: 100; border-radius: 4px;
        }
        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #00ffcc; }
        .stat-val { float: right; color: #fff; font-size: 11px; }
        button { 
            width: 100%; padding: 10px; background: transparent; 
            color: #00ffcc; border: 1px solid #00ffcc; 
            cursor: pointer; margin-top: 5px; font-weight: bold;
        }
        button:hover { background: #00ffcc; color: #000; }
    </style>
</head>
<body>

<div id="interface">
    <div style="margin-bottom: 15px; border-bottom: 1px solid #00ffcc; padding-bottom: 5px; font-size: 14px;">KINETIC_FLOW_v3.1</div>
    
    <div class="control-group">
        <label>Wave Height <span class="stat-val" id="h-val">15</span></label>
        <input type="range" id="amp" min="1" max="50" value="15">
    </div>

    <div class="control-group">
        <label>Motion Speed <span class="stat-val" id="s-val">0.02</span></label>
        <input type="range" id="speed" min="0" max="0.1" step="0.001" value="0.02">
    </div>

    <div class="control-group">
        <label>Wind Direction <span class="stat-val" id="d-val">0.5</span></label>
        <input type="range" id="wind" min="0" max="1" step="0.01" value="0.5">
    </div>

    <div class="control-group">
        <label>Color Spectrum <span class="stat-val" id="c-val">180</span></label>
        <input type="range" id="hue" min="0" max="360" value="180">
    </div>

    <button id="viewToggle">TOGGLE MESH MODE</button>
</div>
