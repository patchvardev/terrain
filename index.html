<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triple Octave Core</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #app-container { position: relative; width: 100%; height: 100%; }
        canvas { display: block; width: 100% !important; height: 100% !important; }
        #ui { 
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0,0,0,0.95); padding: 20px; border: 1px solid #00ffcc;
            color: #fff; width: 260px; border-radius: 4px; pointer-events: auto;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.3);
        }
        .row { margin-bottom: 12px; }
        label { display: block; font-size: 9px; color: #00ffcc; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1.5px; }
        input { width: 100%; cursor: pointer; accent-color: #00ffcc; }
        .val { float: right; color: #fff; font-weight: bold; }
        #hint { font-size: 9px; color: #444; text-align: center; margin-top: 10px; border-top: 1px solid #222; padding-top: 8px; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="ui">
        <div style="font-weight: bold; border-bottom: 1px solid #00ffcc; padding-bottom: 5px; margin-bottom: 15px; font-size: 11px; color: #00ffcc;">TRIPLE_OCTAVE_CORE_v31.0</div>
        
        <div class="row">
            <label>Elevation <span class="val" id="v-fold">15</span></label>
            <input type="range" id="fold" min="0" max="60" value="15">
        </div>
        <div class="row">
            <label>Octave (Complexity) <span class="val" id="v-octave">0.4</span></label>
            <input type="range" id="octave" min="0" max="1" step="0.1" value="0.4">
        </div>
        <div class="row">
            <label>Smoothness (Poly) <span class="val" id="v-det">60</span></label>
            <input type="range" id="det" min="20" max="120" step="10" value="60">
        </div>
        <div class="row">
            <label>Ruggedness <span class="val" id="v-noiseFreq">0.12</span></label>
            <input type="range" id="noiseFreq" min="0.05" max="0.4" step="0.01" value="0.12">
        </div>
        <div class="row">
            <label>Seismic Force <span class="val" id="v-impact">45</span></label>
            <input type="range" id="impact" min="0" max="120" value="45">
        </div>
        <div class="row">
            <label>Biome Spectrum <span class="val" id="v-biome">0%</span></label>
            <input type="range" id="biome" min="0" max="100" value="0">
        </div>
        <div id="hint">DRAG TO ORBIT // HOVER TO DEFORM</div>
    </div>
</div>

<script>
window.addEventListener('load', () => {
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 3000);
    camera.position.set(0, 160, 350);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 1);
    document.getElementById('app-container').appendChild(renderer.domElement);

    const world = new THREE.Group();
    scene.add(world);

    // Cosmic Stars
    const starGeo = new THREE.BufferGeometry();
    const starCoords = [];
    for (let i = 0; i < 2500; i++) {
        starCoords.push((Math.random() - 0.5) * 2000, (Math.random() - 0.5) * 2000, (Math.random() - 0.5) * 2000);
    }
    starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
    scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 1.1 })));

    const sun = new THREE.DirectionalLight(0xffffff, 1.6);
    sun.position.set(100, 200, 100);
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0x222233, 0.4));

    let geometry, material, mesh;
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2(-1, -1);
    let isDragging = false, rotVel = 0, lastX = 0;

    const poles = [
        { low: 0x1a4a63, mid: 0x2d5a27, high: 0xeeeeee },
        { low: 0x4a1a1a, mid: 0xbc4a3c, high: 0xffccaa },
        { low: 0x050505, mid: 0x881100, high: 0xffaa00 },
        { low: 0x001133, mid: 0xa5f2f3, high: 0xffffff }
    ];

    function buildMesh() {
        if (mesh) { world.remove(mesh); geometry.dispose(); }
        const d = parseInt(document.getElementById('det').value);
        geometry = new THREE.PlaneBufferGeometry(200, 200, d, d);
        material = new THREE.MeshPhongMaterial({ vertexColors: true, flatShading: true, side: THREE.DoubleSide, shininess: 0 });
        mesh = new THREE.Mesh(geometry, material);
        mesh.rotation.x = -Math.PI / 2;
        world.add(mesh);
        document.getElementById('v-det').innerText = d;
    }

    window.addEventListener('mousedown', (e) => { if(e.target.tagName !== 'INPUT'){ isDragging = true; lastX = e.clientX; }});
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('mousemove', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        if(isDragging) { rotVel = (e.clientX - lastX) * 0.005; lastX = e.clientX; }
    });

    document.getElementById('det').oninput = buildMesh;
    buildMesh();

    function frame() {
        requestAnimationFrame(frame);
        world.rotation.y += rotVel;
        if (!isDragging) rotVel *= 0.95;

        const pos = geometry.attributes.position;
        const colors = [];
        const fold = parseFloat(document.getElementById('fold').value);
        const freq = parseFloat(document.getElementById('noiseFreq').value);
        const oct = parseFloat(document.getElementById('octave').value);
        const imp = parseFloat(document.getElementById('impact').value);
        const b = parseFloat(document.getElementById('biome').value) / 100;

        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObject(mesh);
        const loc = hits.length > 0 ? mesh.worldToLocal(hits[0].point.clone()) : null;

        const pIdx = Math.floor(b * 3);
        const nIdx = Math.min(pIdx + 1, 3);
        const t = (b * 3) % 1;

        for (let i = 0; i < pos.count; i++) {
            const x = pos.getX(i), y = pos.getY(i);
            
            // Octave 1: Macro Hills
            let z = (Math.sin(x * freq) * Math.cos(y * freq) * fold);
            
            // Octave 2: Mid-range Ridges
            z += (Math.sin(x * freq * 3.1) * Math.cos(y * freq * 2.9) * (fold * oct * 0.5));
            
            // Octave 3: Micro Noise
            z += (Math.sin(x * freq * 7.5) * Math.cos(y * freq * 8.2) * (fold * oct * 0.2));
            
            if (loc) {
                const d = Math.sqrt((x - loc.x)**2 + (y - loc.y)**2);
                if (d < 45) z += (1 - d / 45) * imp;
            }
            
            const curZ = pos.getZ(i);
            const finalZ = curZ + (z - curZ) * 0.2;
            pos.setZ(i, finalZ);

            const low = new THREE.Color(poles[pIdx].low).lerp(new THREE.Color(poles[nIdx].low), t);
            const mid = new THREE.Color(poles[pIdx].mid).lerp(new THREE.Color(poles[nIdx].mid), t);
            const hi = new THREE.Color(poles[pIdx].high).lerp(new THREE.Color(poles[nIdx].high), t);

            let c = new THREE.Color();
            if (finalZ < 2) c.copy(low);
            else if (finalZ < 20) c.copy(mid);
            else c.copy(hi);
            colors.push(c.r, c.g, c.b);
        }

        geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
        pos.needsUpdate = true;
        geometry.computeVertexNormals();

        document.getElementById('v-fold').innerText = fold;
        document.getElementById('v-octave').innerText = oct;
        document.getElementById('v-noiseFreq').innerText = freq;
        document.getElementById('v-impact').innerText = imp;
        document.getElementById('v-biome').innerText = Math.round(b * 100) + "%";
        
        renderer.render(scene, camera);
    }
    frame();
});
</script>
</body>
</html>
