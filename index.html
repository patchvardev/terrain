<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COM 325: Kinetic Surface</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: radial-gradient(circle at center, #333 0%, #000 100%); overflow: hidden; font-family: monospace; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }
        #ui { 
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: rgba(0,0,0,0.85); padding: 20px; border: 1px solid #444;
            color: #fff; width: 240px; border-radius: 4px; pointer-events: auto;
        }
        .row { margin-bottom: 15px; }
        label { display: block; font-size: 10px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; cursor: pointer; accent-color: #00ffcc; }
        .val { float: right; color: #00ffcc; }
        #hint { font-size: 9px; color: #555; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div id="ui">
    <div style="font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 15px;">KINETIC_SURFACE_v22</div>
    
    <div class="row">
        <label>Elevation <span class="val" id="v-fold">12</span></label>
        <input type="range" id="fold" min="0" max="40" value="12">
    </div>
    <div class="row">
        <label>Interaction <span class="val" id="v-impact">40</span></label>
        <input type="range" id="impact" min="0" max="100" value="40">
    </div>
    <div class="row">
        <label>Resolution <span class="val" id="v-det">60</span></label>
        <input type="range" id="det" min="20" max="100" step="10" value="60">
    </div>
    <div class="row">
        <label>Color Hue <span class="val" id="v-hue">180</span></label>
        <input type="range" id="hue" min="0" max="360" value="180">
    </div>
    <div id="hint">CLICK + DRAG TO ROTATE WORLD</div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    let scene = new THREE.Scene();
    let camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
    camera.position.set(0, 100, 200);
    camera.lookAt(0, 0, 0);

    let renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Pivot for clean rotation
    let world = new THREE.Group();
    scene.add(world);

    // Lights
    let light = new THREE.DirectionalLight(0xffffff, 1.2);
    light.position.set(50, 100, 50);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));

    let geometry, material, mesh;
    let raycaster = new THREE.Raycaster();
    let mouse = new THREE.Vector2(-1, -1);
    let isDragging = false, prevX = 0;

    function createMesh() {
        if (mesh) { world.remove(mesh); geometry.dispose(); }
        let d = parseInt(document.getElementById('det').value);
        geometry = new THREE.PlaneBufferGeometry(150, 150, d, d);
        material = new THREE.MeshLambertMaterial({ color: 0x888888, flatShading: true, side: THREE.DoubleSide });
        mesh = new THREE.Mesh(geometry, material);
        mesh.rotation.x = -Math.PI / 2;
        world.add(mesh);
        document.getElementById('v-det').innerText = d;
    }

    window.addEventListener('mousedown', (e) => { if(e.target.tagName !== 'INPUT'){ isDragging = true; prevX = e.clientX; }});
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('mousemove', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        if(isDragging) { world.rotation.y += (e.clientX - prevX) * 0.01; prevX = e.clientX; }
    });

    document.getElementById('det').oninput = createMesh;
    createMesh();

    function animate() {
        requestAnimationFrame(animate);
        let pos = geometry.attributes.position;
        let fold = parseFloat(document.getElementById('fold').value);
        let impact = parseFloat(document.getElementById('impact').value);
        let hue = document.getElementById('hue').value;

        raycaster.setFromCamera(mouse, camera);
        let intersects = raycaster.intersectObject(mesh);
        let localPt = intersects.length > 0 ? mesh.worldToLocal(intersects[0].point.clone()) : null;

        for (let i = 0; i < pos.count; i++) {
            let x = pos.getX(i), y = pos.getY(i);
            let z = (Math.sin(x * 0.12) * Math.cos(y * 0.12) * fold);
            
            if (localPt) {
                let dist = Math.sqrt((x - localPt.x)**2 + (y - localPt.y)**2);
                if (dist < 40) z += (1 - dist / 40) * impact;
            }
            pos.setZ(i, pos.getZ(i) + (z - pos.getZ(i)) * 0.15);
        }

        pos.needsUpdate = true;
        geometry.computeVertexNormals();
        material.color.setHSL(hue / 360, 0.4, 0.45);

        document.getElementById('v-fold').innerText = fold;
        document.getElementById('v-impact').innerText = impact;
        document.getElementById('v-hue').innerText = hue;
        renderer.render(scene, camera);
    }
    animate();
});
</script>
</body>
</html>
