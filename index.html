<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Low-Poly Terrain - COM 325</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a2e; overflow: hidden; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.1); 
              backdrop-filter: blur(10px); padding: 20px; border-radius: 8px; color: white; border: 1px solid rgba(255,255,255,0.2); }
        input { width: 100%; margin: 10px 0; cursor: pointer; }
        label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="ui">
    <label>Tectonic Elevation</label>
    <input type="range" id="amp" min="5" max="40" value="18">
    <label>Geometric Detail</label>
    <input type="range" id="detail" min="20" max="80" value="40">
    <button id="reseed" style="width:100%; padding:5px; background:white; border:none; border-radius:3px; cursor:pointer;">NEW SEED</button>
</div>

<script>
    let scene, camera, renderer, terrain, sun;
    let seed = Math.random() * 100;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.Fog(0x1a1a2e, 50, 150);

        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(60, 60, 60);
        camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Sharp Lighting for "Cool" Shadows
        sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(1, 1, 1);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0x444477));

        createTerrain();
        animate();
    }

    function createTerrain() {
        if (terrain) scene.remove(terrain);

        const amp = parseFloat(document.getElementById('amp').value);
        const det = parseInt(document.getElementById('detail').value);
        
        // Low-poly geometry uses fewer segments
        const geometry = new THREE.PlaneGeometry(100, 100, det, det);
        const pos = geometry.attributes.position;

        for (let i = 0; i < pos.count; i++) {
            let x = pos.getX(i) * 0.1;
            let y = pos.getY(i) * 0.1;
            
            // Clean noise: Layered Sine/Cosine
            let z = (Math.sin(x + seed) * Math.cos(y + seed) * amp);
            z += (Math.sin(x * 2) * Math.cos(y * 2) * (amp/4));
            
            pos.setZ(i, z);
        }

        geometry.computeVertexNormals();

        // FlatShading = The "Cool" Low Poly Look
        const material = new THREE.MeshStandardMaterial({ 
            color: 0x44aaee, 
            flatShading: true,
            metalness: 0.1,
            roughness: 0.5
        });

        terrain = new THREE.Mesh(geometry, material);
        terrain.rotation.x = -Math.PI / 2;
        scene.add(terrain);
    }

    document.getElementById('amp').oninput = createTerrain;
    document.getElementById('detail').oninput = createTerrain;
    document.getElementById('reseed').onclick = () => { seed = Math.random() * 100; createTerrain(); };

    function animate() {
        requestAnimationFrame(animate);
        terrain.rotation.z += 0.002;
        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
