<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Contrast Gradient Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0;
            background: radial-gradient(circle at center, #555555 0%, #000000 100%);
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
            font-family: 'Courier New', monospace; 
        }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #controls { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0, 0, 0, 0.85); padding: 20px; 
            border: 1px solid #00ffcc; color: #00ffcc; 
            width: 260px; z-index: 100; border-radius: 4px;
            pointer-events: auto;
        }
        .slider-wrap { margin-bottom: 12px; }
        label { display: block; font-size: 10px; font-weight: bold; margin-bottom: 4px; color: #00ffcc; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #00ffcc; }
        .val-num { float: right; color: #fff; font-weight: bold; }
        #overlay-btn {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: #00ffcc; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 20px; letter-spacing: 5px;
        }
    </style>
</head>
<body>

<div id="overlay-btn">INITIALIZE_SYSTEM</div>

<div id="controls">
    <div style="font-weight: bold; font-size: 13px; margin-bottom: 12px; border-bottom: 1px solid #00ffcc; padding-bottom: 5px;">STUDIO_ENGINE_v14.0</div>
    
    <div class="slider-wrap">
        <label>Static Elevation <span class="val-num" id="v-fold">15</span></label>
        <input type="range" id="fold" min="0" max="40" value="15">
    </div>

    <div class="slider-wrap">
        <label>Mouse Impact <span class="val-num" id="v-impact">45</span></label>
        <input type="range" id="impact" min="0" max="100" value="45">
    </div>

    <div class="slider-wrap">
        <label>Mesh Detail <span class="val-num" id="v-det">60</span></label>
        <input type="range" id="detail" min="20" max="100" step="10" value="60">
    </div>

    <div class="slider-wrap">
        <label>Color Hue <span class="val-num" id="v-hue">180</span></label>
        <input type="range" id="hue" min="0" max="360" value="180">
    </div>
</div>

<script>
    // Safety check for library loading
    if (typeof THREE === 'undefined') {
        document.body.innerHTML = "<h2 style='color:white; padding:50px;'>Error: Three.js library failed to load. Please check your internet connection or GitHub settings.</h2>";
    }

    let scene, camera, renderer, mesh, geometry, material;
    let mouse = new THREE.Vector2(-1, -1);
    let raycaster = new THREE.Raycaster();

    document.getElementById('overlay-btn').onclick = function() {
        this.style.display = 'none';
        init();
    };

    function init() {
        scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 50, 300);

        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.set(0, 100, 150); 
        camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1.5);
        light.position.set(50, 100, 50);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.3));

        createMesh();

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        document.getElementById('detail').oninput = createMesh;
        animate();
    }

    function createMesh() {
        if (mesh) { scene.remove(mesh); geometry.dispose(); }
        const det = parseInt(document.getElementById('detail').value);
        geometry = new THREE.PlaneBufferGeometry(150, 150, det, det);
        material = new THREE.MeshPhongMaterial({ 
            color: 0x00ffcc, 
            flatShading: true,
            side: THREE.DoubleSide,
            shininess: 50
        });
        mesh = new THREE.Mesh(geometry, material);
        mesh.rotation.x = -Math.PI / 2;
        scene.add(mesh);
        document.getElementById('v-det').innerText = det;
    }

    function animate() {
        requestAnimationFrame(animate);
        const pos = geometry.attributes.position;
        const fold = parseFloat(document.getElementById('fold').value);
        const impact = parseFloat(document.getElementById('impact').value);
        const hue = document.getElementById('hue').value;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObject(mesh);
        let point = (intersects.length > 0) ? intersects[0].point : null;

        for (let i = 0; i < pos.count; i++) {
            let px = pos.getX(i);
            let py = pos.getY(i);
            let z = (Math.sin(px * 0.1) * Math.cos(py * 0.1) * fold);
            
            if (point) {
                const dx = px - point.x;
                const dy = py - (-point.z); 
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 40) z += (1 - dist / 40) * impact;
            }
            pos.setZ(i, pos.getZ(i) + (z - pos.getZ(i)) * 0.2);
        }

        pos.needsUpdate = true;
        geometry.computeVertexNormals();
        material.color.setHSL(hue / 360, 0.5, 0.5);

        document.getElementById('v-fold').innerText = fold;
        document.getElementById('v-impact').innerText = impact;
        document.getElementById('v-hue').innerText = hue;

        renderer.render(scene, camera);
    }
</script>
</body>
</html>
