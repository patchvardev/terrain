<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic Procedural System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #controls { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0, 0, 0, 0.9); padding: 20px; 
            border: 1px solid #00ffcc; color: #00ffcc; 
            width: 260px; z-index: 100; border-radius: 4px;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }
        .slider-wrap { margin-bottom: 18px; }
        label { display: block; font-size: 10px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
        input[type=range] { width: 100%; cursor: crosshair; accent-color: #00ffcc; }
        .val-indicator { float: right; color: #fff; font-size: 11px; }
        button { 
            width: 100%; padding: 10px; background: transparent; 
            color: #00ffcc; border: 1px solid #00ffcc; 
            cursor: pointer; font-weight: bold; margin-top: 5px;
        }
        button:hover { background: #00ffcc; color: #000; }
        #status { font-size: 9px; margin-top: 10px; color: #666; text-align: center; }
    </style>
</head>
<body>

<div id="controls">
    <div style="margin-bottom: 15px; border-bottom: 1px solid #00ffcc; padding-bottom: 8px; font-size: 14px; letter-spacing: 2px;">KINETIC_MESH_v5.0</div>
    
    <div class="slider-wrap">
        <label>Wave Amplitude <span class="val-indicator" id="v-amp">10</span></label>
        <input type="range" id="amp" min="1" max="50" value="10">
    </div>

    <div class="slider-wrap">
        <label>Motion Frequency <span class="val-indicator" id="v-speed">0.02</span></label>
        <input type="range" id="speed" min="0" max="0.1" step="0.001" value="0.02">
    </div>

    <div class="slider-wrap">
        <label>Mouse Pulse Force <span class="val-indicator" id="v-mouse">45</span></label>
        <input type="range" id="mouseAmp" min="0" max="100" value="45">
    </div>

    <div class="slider-wrap">
        <label>Color Spectrum <span class="val-indicator" id="v-hue">180</span></label>
        <input type="range" id="hue" min="0" max="360" value="180">
    </div>

    <button id="toggleWire">TOGGLE RENDER MODE</button>
    <div id="status">INTERACTION_READY // HOVER_TO_DISTORT</div>
</div>

<script>
    let scene, camera, renderer, mesh, geometry, material;
    let clock = new THREE.Clock();
    let mouse = new THREE.Vector2(-1, -1);
    let raycaster = new THREE.Raycaster();
    let isWire = true;

    function init() {
        // Scene and Atmosphere
        scene = new THREE.Scene();
        
        // Perspective Camera
        camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 75, 125);
        camera.lookAt(0, 0, 0);

        // WebGL Renderer
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Lighting System
        const topLight = new THREE.PointLight(0xffffff, 1.2, 600);
        topLight.position.set(0, 150, 50);
        scene.add(topLight);
        scene.add(new THREE.AmbientLight(0x333333));

        // Procedural Geometry (100x100 segments for detail)
        geometry = new THREE.PlaneBufferGeometry(160, 160, 90, 90);
        material = new THREE.MeshPhongMaterial({ 
            color: 0x00ffcc, 
            wireframe: true, 
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.9,
            flatShading: true
        });

        mesh = new THREE.Mesh(geometry, material);
        mesh.rotation.x = -Math.PI / 2; // Orient flat for hover logic
        scene.add(mesh);

        // Interaction Listeners
        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        document.getElementById('toggleWire').onclick = () => {
            isWire = !isWire;
            material.wireframe = isWire;
        };

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        const time = clock.getElapsedTime();
        const pos = geometry.attributes.position;
        
        // Retrieve Parametric Inputs
        const amp = parseFloat(document.getElementById('amp').value);
        const speed = parseFloat(document.getElementById('speed').value);
        const mForce = parseFloat(document.getElementById('mouseAmp').value);
        const hue = document.getElementById('hue').value;

        // Collision detection for Mouse Interaction
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObject(mesh);
        let hoverPoint = null;
        if (intersects.length > 0) {
            hoverPoint = intersects[0].point;
        }

        // Vertex Displacement Loop
        for (let i = 0; i < pos.count; i++) {
            let px = pos.getX(i);
            let py = pos.getY(i);
            
            // Layered Sine Logic (The "Cloth" Ripple)
            let z = Math.sin(px * 0.12 + (time * speed * 40)) * Math.cos(py * 0.12 + (time * speed * 40)) * amp;
            z += Math.sin(px * 0.4 + time) * 2; // Secondary noise layer
            
            // Distance-based Mouse Pulse
            if (hoverPoint) {
                const dx = px - hoverPoint.x;
                const dy = py - hoverPoint.z;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < 35) {
                    // Force exponential lift based on proximity
                    z += (1 - dist / 35) * mForce;
                }
            }
            
            pos.setZ(i, z);
        }

        // Update Mesh Properties
        pos.needsUpdate = true;
        geometry.computeVertexNormals();
        material.color.setHSL(hue / 360, 0.8, 0.5);

        // UI Indicators
        document.getElementById('v-amp').innerText = amp;
        document.getElementById('v-speed').innerText = speed;
        document.getElementById('v-mouse').innerText = mForce;
        document.getElementById('v-hue').innerText = hue;

        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
