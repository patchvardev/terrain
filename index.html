<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Biome Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }
        #ui { 
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: rgba(0,0,0,0.92); padding: 20px; border: 1px solid #00ffcc;
            color: #fff; width: 260px; border-radius: 4px; pointer-events: auto;
        }
        .row { margin-bottom: 12px; }
        label { display: block; font-size: 9px; color: #00ffcc; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1.5px; }
        input { width: 100%; cursor: pointer; accent-color: #00ffcc; }
        .val { float: right; color: #fff; font-weight: bold; }
        #hint { font-size: 9px; color: #444; text-align: center; margin-top: 10px; border-top: 1px solid #222; padding-top: 8px; }
    </style>
</head>
<body>

<div id="ui">
    <div style="font-weight: bold; border-bottom: 1px solid #00ffcc; padding-bottom: 5px; margin-bottom: 15px; font-size: 11px; color: #00ffcc; letter-spacing: 2px;">BIOME_GENERATOR_v26.0</div>
    
    <div class="row">
        <label>Elevation (Noise) <span class="val" id="v-fold">15</span></label>
        <input type="range" id="fold" min="0" max="60" value="15">
    </div>

    <div class="row">
        <label>Ruggedness <span class="val" id="v-noiseFreq">0.12</span></label>
        <input type="range" id="noiseFreq" min="0.05" max="0.4" step="0.01" value="0.12">
    </div>
    
    <div class="row">
        <label>Complexity <span class="val" id="v-octave">0.4</span></label>
        <input type="range" id="octave" min="0" max="1" step="0.1" value="0.4">
    </div>

    <div class="row">
        <label>Planetary Biome <span class="val" id="v-biome">TERRA</span></label>
        <input type="range" id="biome" min="0" max="3" step="1" value="0">
    </div>

    <div class="row">
        <label>Seismic Pulse <span class="val" id="v-impact">45</span></label>
        <input type="range" id="impact" min="0" max="100" value="45">
    </div>
    
    <div id="hint">SWIPE TO ROTATE // HOVER TO DISTORT</div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    let scene = new THREE.Scene();
    let camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 3000);
    camera.position.set(0, 160, 320);
    camera.lookAt(0, 0, 0);

    let renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    let world = new THREE.Group();
    scene.add(world);

    // --- COSMIC STARFIELD ---
    const starGeo = new THREE.BufferGeometry();
    const starCoords = [];
    for (let i = 0; i < 2500; i++) {
        starCoords.push((Math.random() - 0.5) * 2000, (Math.random() - 0.5) * 2000, (Math.random() - 0.5) * 2000);
    }
    starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
    const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.1 });
    const stars = new THREE.Points(starGeo, starMat);
    scene.add(stars);

    // --- SOLAR LIGHTING ---
    let sun = new THREE.DirectionalLight(0xffffff, 1.4);
    sun.position.set(100, 200, 100);
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0x111122, 0.4));

    let geometry, material, mesh;
    let raycaster = new THREE.Raycaster();
    let mouse = new THREE.Vector2(-1, -1);
    let isDragging = false, rotationVelocity = 0, lastMouseX = 0;
    const friction = 0.96, sensitivity = 0.006;

    const biomeNames = ["TERRA", "RED_WASTE", "VOLCANO", "ICE_GIANT"];

    function createMesh() {
        if (mesh) { world.remove(mesh); geometry.dispose(); }
        // Use VertexColors to allow the biome to shade height differently
        geometry = new THREE.PlaneBufferGeometry(180, 180, 80, 80);
        material = new THREE.MeshPhongMaterial({ 
            vertexColors: true, 
            flatShading: true, 
            side: THREE.DoubleSide,
            shininess: 0 
        });
        mesh = new THREE.Mesh(geometry, material);
        mesh.rotation.x = -Math.PI / 2;
        world.add(mesh);
    }

    window.addEventListener('mousedown', (e) => { 
        if(e.target.tagName !== 'INPUT'){ isDragging = true; lastMouseX = e.clientX; }
    });
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('mousemove', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        if(isDragging) {
            rotationVelocity = (e.clientX - lastMouseX) * sensitivity;
            lastMouseX = e.clientX;
        }
    });

    createMesh();

    function animate() {
        requestAnimationFrame(animate);
        world.rotation.y += rotationVelocity;
        stars.rotation.y += 0.0001;
        if (!isDragging) rotationVelocity *= friction;

        let pos = geometry.attributes.position;
        let colors = [];
        let fold = parseFloat(document.getElementById('fold').value);
        let nFreq = parseFloat(document.getElementById('noiseFreq').value);
        let nOct = parseFloat(document.getElementById('octave').value);
        let impact = parseFloat(document.getElementById('impact').value);
        let biomeIdx = parseInt(document.getElementById('biome').value);

        raycaster.setFromCamera(mouse, camera);
        let intersects = raycaster.intersectObject(mesh);
        let localPt = intersects.length > 0 ? mesh.worldToLocal(intersects[0].point.clone()) : null;

        for (let i = 0; i < pos.count; i++) {
            let x = pos.getX(i), y = pos.getY(i);
            
            // Fractal Noise logic
            let z = (Math.sin(x * nFreq) * Math.cos(y * nFreq) * fold);
            z += (Math.sin(x * nFreq * 2.5) * Math.cos(y * nFreq * 2.5) * (fold * nOct));
            
            if (localPt) {
                let dist = Math.sqrt((x - localPt.x)**2 + (y - localPt.y)**2);
                if (dist < 45) z += (1 - dist / 45) * impact;
            }
            
            let currentZ = pos.getZ(i);
            let finalZ = currentZ + (z - currentZ) * 0.15;
            pos.setZ(i, finalZ);

            // --- BIOME COLOR LOGIC ---
            let color = new THREE.Color();
            if (biomeIdx === 0) { // TERRA
                if (finalZ < 2) color.setHex(0x1a4a63);      // Ocean
                else if (finalZ < 15) color.setHex(0x2d5a27); // Forest
                else color.setHex(0xeeeeee);                // Snow
            } else if (biomeIdx === 1) { // RED_WASTE
                if (finalZ < 5) color.setHex(0x4a1a1a);
                else color.setHex(0xbc4a3c);
            } else if (biomeIdx === 2) { // VOLCANO
                if (finalZ > 15) color.setHex(0xff4400);     // Lava peaks
                else color.setHex(0x111111);                // Obsidian
            } else { // ICE_GIANT
                if (finalZ < 10) color.setHex(0xa5f2f3);
                else color.setHex(0xffffff);
            }
            colors.push(color.r, color.g, color.b);
        }

        geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
        pos.needsUpdate = true;
        geometry.computeVertexNormals();

        document.getElementById('v-fold').innerText = fold;
        document.getElementById('v-noiseFreq').innerText = nFreq;
        document.getElementById('v-octave').innerText = nOct;
        document.getElementById('v-impact').innerText = impact;
        document.getElementById('v-biome').innerText = biomeNames[biomeIdx];
        
        renderer.render(scene, camera);
    }
    animate();
});
</script>
</body>
</html>
