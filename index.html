<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Aligned Mesh</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0;
            /* Gradient is now purely a CSS background, won't affect 3D object colors */
            background: radial-gradient(circle at center, #555555 0%, #000000 100%);
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
            font-family: 'Courier New', monospace; 
        }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #controls { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0, 0, 0, 0.8); padding: 20px; 
            border: 1px solid #444; color: #fff; 
            width: 250px; z-index: 100; border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .slider-wrap { margin-bottom: 12px; }
        label { display: block; font-size: 10px; font-weight: bold; margin-bottom: 4px; color: #aaa; text-transform: uppercase; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #fff; }
        .val-num { float: right; color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>

<div id="controls">
    <div style="font-weight: bold; font-size: 13px; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 5px;">ALIGNMENT_ENGINE_v15.0</div>
    
    <div class="slider-wrap">
        <label>Base Geometry <span class="val-num" id="v-fold">12</span></label>
        <input type="range" id="fold" min="0" max="40" value="12">
    </div>

    <div class="slider-wrap">
        <label>Mouse Influence <span class="val-num" id="v-impact">35</span></label>
        <input type="range" id="impact" min="0" max="100" value="35">
    </div>

    <div class="slider-wrap">
        <label>Mesh Resolution <span class="val-num" id="v-det">70</span></label>
        <input type="range" id="detail" min="20" max="100" step="10" value="70">
    </div>

    <div class="slider-wrap">
        <label>Surface Color <span class="val-num" id="v-hue">190</span></label>
        <input type="range" id="hue" min="0" max="360" value="190">
    </div>
</div>

<script>
    let scene, camera, renderer, mesh, geometry, material;
    let mouse = new THREE.Vector2(-1, -1);
    let raycaster = new THREE.Raycaster();

    function init() {
        scene = new THREE.Scene();
        // Removed Fog so the gradient background doesn't wash out the mesh colors

        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.set(0, 110, 140); 
        camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(50, 100, 50);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));

        createMesh();

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        document.getElementById('detail').oninput = createMesh;
        animate();
    }

    function createMesh() {
        if (mesh) { scene.remove(mesh); geometry.dispose(); }
        const det = parseInt(document.getElementById('detail').value);
        geometry = new THREE.PlaneBufferGeometry(150, 150, det, det);
        material = new THREE.MeshPhongMaterial({ 
            color: 0x00ffcc, 
            flatShading: true,
            side: THREE.DoubleSide,
            shininess: 40
        });
        mesh = new THREE.Mesh(geometry, material);
        mesh.rotation.x = -Math.PI / 2;
        scene.add(mesh);
        document.getElementById('v-det').innerText = det;
    }

    function animate() {
        requestAnimationFrame(animate);
        const pos = geometry.attributes.position;
        const fold = parseFloat(document.getElementById('fold').value);
        const impact = parseFloat(document.getElementById('impact').value);
        const hue = document.getElementById('hue').value;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObject(mesh);
        
        // Accurate Local Point Detection
        let localIntersect = null;
        if (intersects.length > 0) {
            // We convert the world-space intersection point back to the mesh's local space
            localIntersect = mesh.worldToLocal(intersects[0].point.clone());
        }

        for (let i = 0; i < pos.count; i++) {
            let px = pos.getX(i);
            let py = pos.getY(i);
            
            // 1. Static Procedural Shape
            let z = (Math.sin(px * 0.1) * Math.cos(py * 0.1) * fold);
            
            // 2. Local-Space Interaction
            if (localIntersect) {
                // Since px/py are local to the Plane, we compare them directly to the local point
                const dx = px - localIntersect.x;
                const dy = py - localIntersect.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < 35) {
                    z += (1 - dist / 35) * impact;
