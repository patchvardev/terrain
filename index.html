<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Cosmic Engine v29</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }
        #ui { 
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: rgba(0,0,0,0.92); padding: 20px; border: 1px solid #00ffcc;
            color: #fff; width: 260px; border-radius: 4px; pointer-events: auto;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
        }
        .row { margin-bottom: 12px; }
        label { display: block; font-size: 9px; color: #00ffcc; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1.5px; }
        input { width: 100%; cursor: pointer; accent-color: #00ffcc; }
        .val { float: right; color: #fff; font-weight: bold; }
        #hint { font-size: 9px; color: #444; text-align: center; margin-top: 10px; border-top: 1px solid #222; padding-top: 8px; }
    </style>
</head>
<body>

<div id="ui">
    <div style="font-weight: bold; border-bottom: 1px solid #00ffcc; padding-bottom: 5px; margin-bottom: 15px; font-size: 11px; color: #00ffcc; letter-spacing: 2px;">PLANETARY_CORE_v29.0</div>
    
    <div class="row">
        <label>Primary Elevation <span class="val" id="v-fold">15</span></label>
        <input type="range" id="fold" min="0" max="60" value="15">
    </div>

    <div class="row">
        <label>Complexity (Octave) <span class="val" id="v-octave">0.4</span></label>
        <input type="range" id="octave" min="0" max="1" step="0.1" value="0.4">
    </div>

    <div class="row">
        <label>Smoothness (Poly) <span class="val" id="v-det">60</span></label>
        <input type="range" id="det" min="20" max="120" step="10" value="60">
    </div>

    <div class="row">
        <label>Ruggedness <span class="val" id="v-noiseFreq">0.12</span></label>
        <input type="range" id="noiseFreq" min="0.05" max="0.4" step="0.01" value="0.12">
    </div>

    <div class="row">
        <label>Seismic Force <span class="val" id="v-impact">45</span></label>
        <input type="range" id="impact" min="0" max="120" value="45">
    </div>
    
    <div class="row">
        <label>Biome Spectrum <span class="val" id="v-biome">0%</span></label>
        <input type="range" id="biome" min="0" max="100" value="0">
    </div>
    
    <div id="hint">DRAG TO ORBIT // HOVER TO DEFORM</div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    let scene = new THREE.Scene();
    let camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 3000);
    camera.position.set(0, 160, 320);
    camera.lookAt(0, 0, 0);

    let renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    let world = new THREE.Group();
    scene.add(world);

    // Cosmic Starfield
    const starGeo = new THREE.BufferGeometry();
    const starCoords = [];
    for (let i = 0; i < 2000; i++) {
        starCoords.push((Math.random() - 0.5) * 2000, (Math.random() - 0.5) * 2000, (Math.random() - 0.5) * 2000);
    }
    starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
    const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 1.1 }));
    scene.add(stars);

    let sun = new THREE.DirectionalLight(0xffffff, 1.4);
    sun.position.set(100, 200, 100);
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0x222233, 0.4));

    let geometry, material, mesh;
    let raycaster = new THREE.Raycaster();
    let mouse = new THREE.Vector2(-1, -1);
    let isDragging = false, rotationVelocity = 0, lastMouseX = 0;

    const poles = [
        { low: 0x1a4a63, mid: 0x2d5a27, high: 0xeeeeee }, // Earthly
        { low: 0x4a1a1a, mid: 0xbc4a3c, high: 0xffccaa }, // Martian
        { low: 0x111111, mid: 0x661100, high: 0xff4400 }, // Volcanic
        { low: 0x001133, mid: 0xa5f2f3, high: 0xffffff }  // Glacial
    ];

    function createMesh() {
        if (mesh) { world.remove(mesh); geometry.dispose(); }
        let d = parseInt(document.getElementById('det').value);
        geometry = new THREE.PlaneBufferGeometry(180, 180, d, d);
        material = new THREE.MeshPhongMaterial({ vertexColors: true, flatShading: true, side: THREE.DoubleSide, shininess: 0 });
        mesh = new THREE.Mesh(geometry, material);
        mesh.rotation.x = -Math.PI / 2;
        world.add(mesh);
        document.getElementById('v-det').innerText = d;
    }

    window.addEventListener('mousedown', (e) => { if(e.target.tagName !== 'INPUT'){ isDragging = true; lastMouseX = e.clientX; }});
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('mousemove', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        if(isDragging) {
            rotationVelocity = (e.clientX - lastMouseX) * 0.005;
            lastMouseX = e.clientX;
        }
    });

    document.getElementById('det').oninput = createMesh;
    createMesh();

    function animate() {
        requestAnimationFrame(animate);
        world.rotation.y += rotationVelocity;
        stars.rotation.y += 0.0001;
        if (!isDragging) rotationVelocity *= 0.96;

        let pos = geometry.attributes.position;
        let colors = [];
        let fold = parseFloat(document.getElementById('fold').value);
        let nFreq = parseFloat(document.getElementById('noiseFreq').value);
        let nOct = parseFloat(document.getElementById('octave').value);
        let impact = parseFloat(document.getElementById('impact').value);
        let bSlider = parseFloat(document.getElementById('biome').value) / 100;

        raycaster.setFromCamera(mouse, camera);
        let intersects = raycaster.intersectObject(mesh);
        let localPt = intersects.length > 0 ? mesh.worldToLocal(intersects[0].point.clone()) : null;

        let poleIdx = Math.floor(bSlider * (poles.length - 1));
        let nextIdx = Math.min(poleIdx + 1, poles.length - 1);
        let lerpT = (bSlider * (poles.length - 1)) % 1;

        for (let i = 0; i < pos.count; i++) {
            let x = pos.getX(i), y = pos.getY(i);
            
            // Octave 1: Macro Terrain
            let z = (Math.sin(x * nFreq) * Math.cos(y * nFreq) * fold);
            
            // Octave 2: Micro Terrain
            z += (Math.sin(x * nFreq * 2.5) * Math.cos(y * nFreq * 2.5) * (fold * nOct));
            
            // User Disturbance
            if (localPt) {
                let dist = Math.sqrt((x - localPt.x)**2 + (y - localPt.y)**2);
                if (dist < 45) z += (1 - dist / 45) * impact;
            }
            
            let curZ = pos.getZ(i);
            let finalZ = curZ + (z - curZ) * 0.15;
            pos.setZ(i, finalZ);

            // Dynamic Biome LERP
            let lowC = new THREE.Color(poles[poleIdx].low).lerp(new THREE.Color(poles[nextIdx].low), lerpT);
            let midC = new THREE.Color(poles[poleIdx].mid).lerp(new THREE.Color(poles[nextIdx].mid), lerpT);
            let highC = new THREE.Color(poles[poleIdx].high).lerp(new THREE.Color(poles[nextIdx].high), lerpT);

            let finalC = new THREE.Color();
            if (finalZ < 2) finalC.copy(lowC);
            else if (finalZ < 18) finalC.copy(midC);
            else finalC.copy(highC);

            colors.push(finalC.r, finalC.g, finalC.b);
        }

        geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
        pos.needsUpdate = true;
        geometry.computeVertexNormals();

        document.getElementById('v-fold').innerText = fold;
        document.getElementById('v-octave').innerText = nOct;
        document.getElementById('v-noiseFreq').innerText = nFreq;
        document.getElementById('v-impact').innerText = impact;
        document.getElementById('v-biome').innerText = Math.round(bSlider * 100) + "%";
        
        renderer.render(scene, camera);
    }
    animate();
});
</script>
</body>
</html>
