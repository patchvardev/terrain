<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kinetic Procedural Terrain</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; font-family: 'Courier New', monospace; }
        #ui { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); 
              padding: 20px; border: 1px solid #00ffcc; color: #00ffcc; width: 260px; z-index: 10; }
        .group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; cursor: crosshair; }
        .val { float: right; color: #fff; }
        button { width: 100%; padding: 8px; background: transparent; color: #00ffcc; border: 1px solid #00ffcc; cursor: pointer; margin-top: 10px; }
        button:hover { background: #00ffcc; color: #000; }
    </style>
</head>
<body>

<div id="ui">
    <div style="margin-bottom: 15px; border-bottom: 1px solid #00ffcc; padding-bottom: 5px;">KINETIC_PROCEDURAL_V3</div>
    
    <div class="group">
        <label>Wave Intensity <span class="val" id="amp-v">15</span></label>
        <input type="range" id="amp" min="2" max="40" value="15">
    </div>

    <div class="group">
        <label>Ripple Speed <span class="val" id="speed-v">0.02</span></label>
        <input type="range" id="speed" min="0" max="0.1" step="0.005" value="0.02">
    </div>

    <div class="group">
        <label>Hue Shift <span class="val" id="hue-v">180</span></label>
        <input type="range" id="hue" min="0" max="360" value="180">
    </div>

    <div class="group">
        <label>Fabric Opacity <span class="val" id="op-v">0.8</span></label>
        <input type="range" id="opacity" min="0.1" max="1.0" step="0.1" value="0.8">
    </div>

    <button id="wireframe">TOGGLE WIREFRAME</button>
</div>
