<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planetary Mesh Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background-color: #ffffff; overflow: hidden; font-family: 'Courier New', monospace; }
        #controls { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(255, 255, 255, 0.9); padding: 20px; 
            border: 1px solid #ddd; color: #222; 
            width: 260px; z-index: 100; border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .slider-wrap { margin-bottom: 15px; }
        label { display: block; font-size: 10px; font-weight: bold; margin-bottom: 5px; color: #888; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #2e7d32; }
        .val-num { float: right; color: #000; }
        #status-bar { font-size: 9px; margin-top: 15px; padding-top: 10px; border-top: 1px solid #eee; color: #aaa; text-align: center; }
    </style>
</head>
<body>

<div id="controls">
    <div style="font-weight: bold; font-size: 13px; margin-bottom: 15px; border-bottom: 2px solid #2e7d32; padding-bottom: 5px;">PLANETARY_STUDIO_v8.0</div>
    
    <div class="slider-wrap">
        <label>Tectonic Elevation <span class="val-num" id="v-fold">8</span></label>
        <input type="range" id="fold" min="0" max="25" value="8">
    </div>

    <div class="slider-wrap">
        <label>Seismic Force <span class="val-num" id="v-impact">45</span></label>
        <input type="range" id="impact" min="0" max="100" value="45">
    </div>

    <div class="slider-wrap">
        <label>Ecosystem (Biome) <span class="val-num" id="v-eco">Earth</span></label>
        <input type="range" id="eco" min="0" max="2" step="1" value="0">
    </div>

    <div id="status-bar">SURFACE_ALIGNED // INTERACTION_FULL</div>
</div>

<script>
    let scene, camera, renderer, mesh, geometry, material;
    let mouse = new THREE.Vector2(-1, -1);
    let raycaster = new THREE.Raycaster();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        scene.fog = new THREE.Fog(0xffffff, 150, 450);

        // Orthographic-like Perspective for better surface coverage
        camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 140, 180); 
        camera.lookAt(0, -20, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sun = new THREE.DirectionalLight(0xffffff, 0.5);
        sun.position.set(100, 200, 100);
        sun.castShadow = true;
        scene.add(sun);

        // Expanded Mesh (180x180) to ensure full screen interaction
        geometry = new THREE.PlaneBufferGeometry(250, 250, 90, 90);
        material = new THREE.MeshPhongMaterial({ 
            vertexColors: true,
            flatShading: true,
            side: THREE.DoubleSide,
            shininess: 0
        });

        mesh = new THREE.Mesh(geometry, material);
        mesh.rotation.x = -Math.PI / 2;
        mesh.receiveShadow = true;
        scene.add(mesh);

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        const pos = geometry.attributes.position;
        const colors = [];
        
        const fold = parseFloat(document.getElementById('fold').value);
        const impact = parseFloat(document.getElementById('impact').value);
        const ecoMode = parseInt(document.getElementById('eco').value);

        // Precise Raycasting for full-surface interaction
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObject(mesh);

            point = intersects[0].point;
        }
