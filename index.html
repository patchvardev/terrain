<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Visibility Mesh Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { 
            margin: 0; 
            background: #111; /* Dark Grey for contrast */
            height: 100vh;
            overflow: hidden; 
            font-family: monospace; 
        }
        canvas { display: block; }
        #controls { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0, 0, 0, 0.9); padding: 20px; 
            border: 1px solid #00ffcc; color: #00ffcc; 
            width: 250px; z-index: 100; border-radius: 4px;
        }
        .slider-wrap { margin-bottom: 12px; }
        label { display: block; font-size: 10px; font-weight: bold; margin-bottom: 4px; color: #00ffcc; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #00ffcc; }
        .val-num { float: right; color: #fff; font-weight: bold; }
    </style>
</head>
<body>

<div id="controls">
    <div style="font-weight: bold; font-size: 13px; margin-bottom: 15px; border-bottom: 1px solid #00ffcc; padding-bottom: 5px;">STUDIO_MESH_V18</div>
    
    <div class="slider-wrap">
        <label>Elevation <span class="val-num" id="v-fold">10</span></label>
        <input type="range" id="fold" min="0" max="40" value="10">
    </div>

    <div class="slider-wrap">
        <label>Mouse Force <span class="val-num" id="v-impact">40</span></label>
        <input type="range" id="impact" min="0" max="100" value="40">
    </div>

    <div class="slider-wrap">
        <label>Detail <span class="val-num" id="v-det">60</span></label>
        <input type="range" id="detail" min="20" max="100" step="10" value="60">
    </div>

    <div class="slider-wrap">
        <label>Color Hue <span class="val-num" id="v-hue">180</span></label>
        <input type="range" id="hue" min="0" max="360" value="180">
    </div>
</div>

<script>
    let scene, camera, renderer, mesh, geometry, material;
    let mouse = new THREE.Vector2(-1, -1);
    let raycaster = new THREE.Raycaster();

    function init() {
        scene = new THREE.Scene();

        // Camera moved up and back for a clear view of the center
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.set(0, 120, 150); 
        camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // High Intensity Lights
        const light1 = new THREE.PointLight(0xffffff, 1.5);
        light1.position.set(0, 150, 50);
        scene.add(light1);
        
        const light2 = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(light2);

        createMesh();

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        document.getElementById('detail').oninput = createMesh;
        animate();
    }

    function createMesh() {
        if (mesh) { scene.remove(mesh); geometry.dispose(); }
        const det = parseInt(document.getElementById('detail').value);
        // Plane size increased for visibility
        geometry = new THREE.PlaneBufferGeometry(160, 160, det, det);
        material = new THREE.MeshPhongMaterial({ 
            color: 0x00ffcc, 
            flatShading: true, 
            side: THREE.DoubleSide,
            shininess: 50
        });
        mesh = new THREE.Mesh(geometry, material);
        mesh.rotation.x = -Math.PI / 2;
        scene.add(mesh);
        document.getElementById('v-det').innerText = det;
    }

    function animate() {
        requestAnimationFrame(animate);
        const pos = geometry.attributes.position;
        const fold = parseFloat(document.getElementById('fold').value);
        const impact = parseFloat(document.getElementById('impact').value);
        const hue = document.getElementById('hue').value;

        // Interaction Check
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObject(mesh);
        let intersectPoint = null;
        if (intersects.length > 0) {
            intersectPoint = intersects[0].point;
        }

        for (let i = 0; i < pos.count; i++) {
            let px = pos.getX(i);
            let py = pos.getY(i);
            
            // Base Procedural Math
            let z = (Math.sin(px * 0.1) * Math.cos(py * 0.1) * fold);
            
            // Interaction Logic - Direct 3D distance check
            if (intersectPoint) {
                // Since mesh is flat on XZ, we check 2D distance to mouse point
                const dist = Math.sqrt(Math.pow(px - intersectPoint.x, 2) + Math.pow(py - (-intersectPoint.z), 2));
                if (dist < 40) {
                    z += (1 - dist / 40) * impact;
                }
            }
            
            // Damping for smooth motion
            let curZ = pos.getZ(i);
            pos.setZ(i, curZ + (z - curZ) * 0.15);
        }

        pos.needsUpdate = true;
        geometry.computeVertexNormals();
        material.color.setHSL(hue / 360, 0.5, 0.4);

        document.getElementById('v-fold').innerText = fold;
        document.getElementById('v-impact').innerText = impact;
        document.getElementById('v-hue').innerText = hue;

        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
