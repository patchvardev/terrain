<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced Procedural Biosphere - COM 325</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #ui { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.85); padding: 20px; border: 1px solid #444; color: #fff; width: 250px; border-radius: 4px; z-index: 10; }
        .slider-group { margin-bottom: 20px; }
        label { display: block; font-size: 10px; letter-spacing: 1px; margin-bottom: 8px; color: #aaa; }
        input { width: 100%; filter: hue-rotate(150deg); }
        .stats { font-size: 9px; color: #666; margin-top: 10px; border-top: 1px solid #333; pt: 10px; }
    </style>
</head>
<body>

<div id="ui">
    <div style="font-size: 14px; margin-bottom: 20px; color: #00ffcc;">BIOSPHERE_OS v2.6</div>
    
    <div class="slider-group">
        <label>TECTONIC_FORCE (Amplitude)</label>
        <input type="range" id="amp" min="2" max="45" value="25">
    </div>

    <div class="slider-group">
        <label>ATMOSPHERIC_DENSITY (Fog)</label>
        <input type="range" id="fog" min="0.005" max="0.05" step="0.001" value="0.01">
    </div>

    <div class="slider-group">
        <label>EVOLUTION_SPEED (Time)</label>
        <input type="range" id="speed" min="0" max="0.05" step="0.001" value="0.01">
    </div>

    <div class="stats">
        COORD: <span id="stat-coord">0,0</span><br>
        PHASE: III_INTERACTION
    </div>
</div>

<script>
    let scene, camera, renderer, terrain, geometry, sun;
    let time = 0;

    function init() {
        scene = new THREE.Scene();
        
        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 40, 100);
        camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Dynamic Lighting for Day/Night Cycle
        sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(50, 100, 50);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0x202020));

        createTerrain();
        animate();
    }

    function createTerrain() {
        if (terrain) scene.remove(terrain);
        
        // High-density mesh for "Subtle Poetic Practice"
        geometry = new THREE.PlaneGeometry(150, 150, 128, 128);
        const material = new THREE.MeshStandardMaterial({ 
            vertexColors: true, 
            roughness: 0.7,
            metalness: 0.2
        });

        terrain = new THREE.Mesh(geometry, material);
        terrain.rotation.x = -Math.PI / 2;
        scene.add(terrain);
    }

    function updateGeometry() {
        const pos = geometry.attributes.position;
        const colors = [];
        const amp = parseFloat(document.getElementById('amp').value);
        const speed = parseFloat(document.getElementById('speed').value);
        time += speed;

        for (let i = 0; i < pos.count; i++) {
            let x = pos.getX(i) * 0.05;
            let y = pos.getY(i) * 0.05;
            
            // "Living" Noise: Time-based Sine Summation
            let z = (Math.sin(x + time) * Math.cos(y + time) * amp) + 
                    (Math.sin(x * 2.1 + time * 1.5) * 4);
            
            pos.setZ(i, z);

            // Dynamic Biome Mapping
            const color = new THREE.Color();
            if (z < -2) color.setHex(0x1a3a5a); // Deep Water
            else if (z < 2) color.setHex(0x2a5a8a); // Shallows
            else if (z < 5) color.setHex(0xd2b48c); // Coastal
            else if (z < 18) color.setHex(0x2d5a27); // Forest
            else color.setHex(0xeeeeee); // Tundra
            
            colors.push(color.r, color.g, color.b);
        }

        geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
        pos.needsUpdate = true;
        geometry.computeVertexNormals();

        // Update Scene Environment
        const fogVal = parseFloat(document.getElementById('fog').value);
        scene.fog = new THREE.FogExp2(0x000000, fogVal);
        
        // Update Sun Position (Day/Night)
        sun.position.x = Math.sin(time * 0.2) * 100;
        sun.position.y = Math.cos(time * 0.2) * 100;
        
        document.getElementById('stat-coord').innerText = `${Math.floor(sun.position.x)}, ${Math.floor(sun.position.y)}`;
    }

    function animate() {
        requestAnimationFrame(animate);
        updateGeometry();
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
</script>
</body>
</html>
